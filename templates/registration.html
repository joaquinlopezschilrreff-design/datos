<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<main class="main-login">
    <form method="post" class="login">
        <input class="form__input" type="text" name="username" placeholder="Usuario" required>
        <input class="form__input" type="email" name="email" placeholder="Email" required>
        <input class="form__input" type="password" name="password" placeholder="Password" required>
        <button class="form__button">Registrar</button>
        <a href="/" class="form__button">Cancelar</a>
    </form>
</main>
</body>
</html>
